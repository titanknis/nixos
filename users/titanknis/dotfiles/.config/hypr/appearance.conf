#####################
### LOOK AND FEEL ###
#####################

# source = ./themes/gruvbox.conf

# General Settings
general {
    gaps_in = 4
    gaps_out = 8
    # gaps_in = 4
    # gaps_out = 8
    # border_size = 2
    border_size = 4
    # col.active_border = rgb(33ccff)     # Default hyprland border blue
    # col.active_border = rgba(d79921ff)     # #d79921 Gruvbox yellow
    # col.active_border = rgba(fe8019ff)     # #fe8019 Gruvbox Orange
    # col.active_border =  rgba(98971aff)      # #98971a Gruvbox green
    # col.inactive_border =  rgba(98971aff)      # #98971a Gruvbox green
    col.active_border =  rgb(b8bb26)      # #b8bb26 Gruvbox bright green
    resize_on_border = true
    allow_tearing = false
    layout = master
    # layout = monocle
    # layout = scrolling
    # layout = dwindle
}

# Decoration
decoration {
    # rounding = 4
    # rounding = 8
    active_opacity = 1.0
    inactive_opacity = 1.0
    
    shadow {
        enabled = no
        # enabled = true
        range = 4
        render_power = 3
        color = rgba(1d2021ee)
    }
    
    blur {
        enabled = no
        # enabled = true
        size = 6
        passes = 3
        # passes = 3
        xray = true

    }
}

# Animations

# https://wiki.hypr.land/Configuring/Variables/#animations
# animations {
#     enabled = yes, please :)
#
#     # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
#     #        NAME,           X0,   Y0,   X1,   Y1
#     bezier = easeOutQuint,   0.23, 1,    0.32, 1
#     bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
#     bezier = linear,         0,    0,    1,    1
#     bezier = almostLinear,   0.5,  0.5,  0.75, 1
#     bezier = quick,          0.15, 0,    0.1,  1
#
#     # Default animations, see https://wiki.hypr.land/Configuring/Animations/
#     #           NAME,              ONOFF, SPEED, CURVE,        [STYLE]
#     animation = global,            0,     10,    default
#     animation = border,            0,     10.00,  easeOutQuint
#
#     # animation = windows,           1,     50.00,  easeOutQuint
#     # animation = windowsIn,         1,     50.0,   easeOutQuint, popin 87%
#     # animation = windowsOut,        0,     50.00,  linear,       popin 87%
#     # animation = fadeIn,            1,     50.00,  almostLinear
#     # animation = fadeOut,           1,     50.00,  almostLinear
#     # animation = fade,              1,     3.00,  quick
#     # animation = windows,           1,     3.00,  easeOutQuint
#     # animation = windowsIn,         1,     1.00,   easeOutQuint, popin 50%
#     animation = windowsIn,         1,     4.0,   easeOutQuint, popin 87%
#     # animation = windowsOut,        1,     100.00,  easeOutQuint, popin 80%
#     animation = windowsMove,           1,     4.00,  easeOutQuint
#     animation = fadeIn,            1,     1.50,  almostLinear
#     # animation = fadeOut,           1,     20.00,  almostLinear
#     # animation = fade,              1,     3.00,  quick
#
#     # animation = layers,            1,     4,  easeOutQuint
#     # animation = layersIn,          1,     4,     easeOutQuint, fade
#     # animation = layersOut,         0,     1.5,   linear,       fade
#     # animation = fadeLayersIn,      1,     1.79,  almostLinear
#     # animation = fadeLayersOut,     1,     1.39,  almostLinear
#
#     # animation = workspaces,        1,     1.94,  almostLinear, fade
#     # animation = workspacesIn,      1,     1.21,  almostLinear, fade
#     # animation = workspacesOut,     1,     1.94,  almostLinear, fade
#     animation = workspaces,        1,     5.00,  easeOutQuint, slide top # PERF:
#     animation = workspacesIn,      1,     5.00,  easeOutQuint, slide # PERF:
#     animation = workspacesOut,     1,     5.00,  easeOutQuint, slide # PERF:
#     animation = specialWorkspace,  1,     3.00,  easeOutQuint, slide top# PERF:
#
#     animation = zoomFactor,    1,     7,     quick
# }

# minimal animation for dwm like flow
animations {
    enabled = true

    bezier = instant, 0, 0, 1, 1

    animation = global, 0, 1, instant
    # animation = windows, 0, 1, instant
    animation = workspaces, 1, 1, instant
    animation = specialWorkspace, 1, 1, instant, slide top
    animation = fade, 0        # kill fade specifically, it's the worst offender
}

# Layouts
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    mfact = 0.70            # master pane width ratio (tweak to taste) ()default is 0.55)
    # new_on_top = true      # stack order preference
}

# Misc Settings
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    on_focus_under_fullscreen = 1   # inherit fullscreen on focus switch
    on_focus_under_fullscreen = 1
}

binds {
    movefocus_cycles_fullscreen = true
}
