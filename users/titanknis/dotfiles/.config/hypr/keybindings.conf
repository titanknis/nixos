###################
### KEYBINDINGS ###
###################

# Keyboard Layout: Colemak-DH

#################
### MODIFIERS ###
#################
$mainmod = SUPER
$submod  = ALT
$CTRLmod = CTRL

####################
### APPLICATIONS ###
####################
$terminal    = kitty
$filemanager = yazi
$editor      = nvim
$browser     = qutebrowser

#############
### MENUS ###
#############
$menu          = rofi -show drun
$window        = rofi -show window
$calc          = rofi -show calc -p "󱖦" -no-show-match -no-sort -calc-command 'wtype "{result}" && wl-copy {result}'
$passmenu      = ~/.config/hypr/scripts/passMenu.sh
$powermenu     = ~/.config/hypr/scripts/powerMenu.sh
$networkmenu  = ~/.config/hypr/scripts/networkMenu.sh
$emojimenu     = ~/.config/hypr/scripts/emojiMenu.sh
$wallpapermenu = ~/.config/hypr/scripts/wallpaperMenu.sh
$timer         = ~/.config/hypr/scripts/timerMenu.sh

###############
### ACTIONS ###
###############
$lockscreen    = hyprlock
$screenshot    = mkdir -p ~/Pictures/screenshots ; grim - | tee ~/Pictures/screenshots/$(date +%Y-%m-%d_%Hh%Mm%Ss).png | wl-copy --type image/png
$screencapture = mkdir -p ~/Pictures/screenshots ; grim -g "$(slurp)" - | tee ~/Pictures/screenshots/$(date +%Y-%m-%d_%Hh%Mm%Ss)_slurp.png | wl-copy --type image/png
$earphones     = bluetoothctl info 54:84:50:E3:2D:90 | grep -q "Connected: yes" && bluetoothctl disconnect 54:84:50:E3:2D:90 || bluetoothctl connect 54:84:50:E3:2D:90
$extracttext   = grim -g "$(slurp)" - | tesseract stdin stdout | wl-copy

#######################
### SYSTEM CONTROLS ###
#######################

# Session Management
bind = $mainmod, delete,           exit                    # Exit Hyprland
bind = $CTRLmod ALT, delete,       exec, shutdown now      # Shutdown
bind = $mainmod, h,                exec, systemctl hibernate # Hibernate
bind = $mainmod, l,                exec, $lockscreen       # Lock screen
bindl = , switch:on:Lid Switch,    exec, $lockscreen       # Lock on lid close

# Core Applications
bind = $mainmod, t,                exec, $terminal         # Terminal (alt)
bind = $mainmod, c,                exec, $terminal nvim -c ':CompetiTest receive contest' # Code editor
bind = $mainmod, y,                exec, $terminal $filemanager # File manager
bind = $mainmod, b,                exec, $browser          # Web browser
bind = $mainmod, f,                exec, $browser          # Web browser
bind = CTRL ALT, w,                exec, pkill waybar || waybar # Toggle waybar
bind = $mainmod SHIFT, w,          exec, pkill waybar || waybar # Toggle waybar
# bind = $submod, b,                 exec, pkill waybar || waybar # Toggle waybar
bind = $submod, b,                 exec, $earphones        # Bluetooth earphones

# System Scripts
bind = $submod SHIFT, R,           exec, timeout 2s bash ~/.config/hypr/scripts/wallpaper.sh # Random wallpaper
bind = $mainmod, k,                exec, ~/.config/hypr/scripts/touchpadToggle.sh # Toggle touchpad
bind = CTRL ALT, k,                exec, ~/.config/hypr/scripts/kanataToggle.sh # Toggle kanata

##################
### ROFI MENUS ###
##################
bind = $submod, space,             exec, pkill rofi || $menu         # App launcher
bind = $submod, q,                 exec, pkill rofi || $calc         # Calculator
bind = $submod, t,                 exec, pkill rofi || $timer        # Timer
bind = $submod, w,                 exec, pkill rofi || $window       # Window switcher
bind = $submod, p,                 exec, pkill rofi || $passmenu     # Password menu
bind = $submod, e,                 exec, pkill rofi || $emojimenu    # Emoji menu
bind = $submod, backspace,         exec, pkill rofi || $powermenu    # Power menu
bind = $submod, d,                 exec, pkill rofi || $networkmenu  # WiFi/Bluetooth menu
bind = $mainmod, d,                 exec, pkill rofi || $networkmenu  # WiFi/Bluetooth menu
bind = $submod, r,                 exec, pkill rofi || $wallpapermenu # Wallpaper menu
bind = $submod, v,                 exec, pkill rofi || cliphist list | rofi -dmenu -p " " | cliphist decode | wl-copy # Clipboard
bind = $mainmod, v,                exec, pkill rofi || cliphist list | rofi -dmenu -p " " | cliphist decode | wl-copy # Clipboard (alt)

######################
### SCREEN CAPTURE ###
######################
bind = $mainmod, print,            exec, $screenshot        # Full screenshot
bind = $mainmod SHIFT, x,          exec, $extracttext       # Screenshot & OCR
bind = $mainmod SHIFT, c,          exec, $screencapture     # Area screenshot
bind = $mainmod SHIFT, p,          exec, hyprpicker -a      # Color picker

#########################
### WINDOW MANAGEMENT ###
#########################

# --- Window Controls ---
bind = $mainmod, q,                killactive                       # Close window
bind = ALT, f4,                    killactive                       # Close window (alt)
bind = $mainmod SHIFT, m,          fullscreen                       # Fullscreen
bind = $mainmod, m,                fullscreen, 1                    # Fake fullscreen
bind = $mainmod, w,                togglefloating                   # Toggle floating
bind = $mainmod, p,                pin                              # Pin floating window
bind = $mainmod SHIFT, f,          cyclenext, floating              # Focus floating window
bind = $submod SHIFT, p,           pseudo                           # Pseudo tile (rare)

# --- Window Focus (Colemak-DH + arrows) ---
bind = $mainmod, n,                movefocus, l                     # Focus left
bind = $mainmod, i,                movefocus, r                     # Focus right
bind = $mainmod, u,                movefocus, u                     # Focus up
bind = $mainmod, e,                movefocus, d                     # Focus down
bind = $mainmod, left,             movefocus, l
bind = $mainmod, right,            movefocus, r
bind = $mainmod, up,               movefocus, u
bind = $mainmod, down,             movefocus, d
bind = $mainmod, TAB,              workspace, previous              # Previous workspace
bind = ALT, TAB,                   cyclenext, prev                  # Alt-Tab

# --- Window Resizing (mainly floating) (keep comment) ---
binde = $submod CTRL, i,      resizeactive, 30 0     # Grow right
binde = $submod CTRL, n,      resizeactive, -30 0    # Shrink left
binde = $submod CTRL, u,      resizeactive, 0 -30    # Shrink up
binde = $submod CTRL, e,      resizeactive, 0 30     # Grow down
binde = $submod CTRL, right,  resizeactive, 30 0
binde = $submod CTRL, left,   resizeactive, -30 0
binde = $submod CTRL, up,     resizeactive, 0 -30
binde = $submod CTRL, down,   resizeactive, 0 30

# --- Window Moving (mainly floating) (keep comment) ---
binde = $mainmod CTRL, i,     moveactive, 30 0       # Move right
binde = $mainmod CTRL, n,     moveactive, -30 0      # Move left
binde = $mainmod CTRL, u,     moveactive, 0 -30      # Move up
binde = $mainmod CTRL, e,     moveactive, 0 30       # Move down
binde = $mainmod CTRL, right, moveactive, 30 0
binde = $mainmod CTRL, left,  moveactive, -30 0
binde = $mainmod CTRL, up,    moveactive, 0 -30
binde = $mainmod CTRL, down,  moveactive, 0 30

# --- Mouse Window Controls ---
bindm = $mainmod, mouse:272,       movewindow                       # Drag to move
bindm = $mainmod, mouse:273,       resizewindow                     # Drag to resize

#######################
### LAYOUT CONTROLS ###
#######################

# Promote and cycle
bind = $mainmod, o,                layoutmsg, swapwithmaster master  # promote, stay on master
bind = $mainmod, r,                layoutmsg, cyclenext    # cycle forward   (kind of do a similar job to # Window focus (Vim-style + Arrow keys))
bind = $mainmod SHIFT, r,          layoutmsg, cycleprev    # cycle backward  (kind of do a similar job to # Window focus (Vim-style + Arrow keys))
## Roll — bring stack to master without leaving master
# bind = $mainmod, r,      layoutmsg, rollprev
# bind = $mainmod SHIFT, r, layoutmsg, rollnext


# Structure (rare)
bind = $mainmod SHIFT, u,          movewindow, u               # move window up in stack
bind = $mainmod SHIFT, e,          movewindow, d               # move window down in stack
bind = $mainmod SHIFT, l,          layoutmsg, addmaster        # swap with master(Master Layout)
bind = $mainmod SHIFT, y,          layoutmsg, removemaster     # demote master → stack

# Master split ratio
binde = $submod SHIFT, i,          layoutmsg, mfact +0.05   # Grow master
binde = $submod SHIFT, n,          layoutmsg, mfact -0.05   # Shrink master

############################
### WORKSPACE MANAGEMENT ###
############################

# Direct Workspace Switching
bind = $mainmod, 1,                workspace, 1
bind = $mainmod, 2,                workspace, 2
bind = $mainmod, 3,                workspace, 3
bind = $mainmod, 4,                workspace, 4
bind = $mainmod, 5,                workspace, 5
bind = $mainmod, 6,                workspace, 6
bind = $mainmod, 7,                workspace, 7
bind = $mainmod, 8,                workspace, 8
bind = $mainmod, 9,                workspace, 9
bind = $mainmod, 0,                workspace, 10

# Move Window to Workspace
bind = $mainmod SHIFT, 1,          movetoworkspace, 1
bind = $mainmod SHIFT, 2,          movetoworkspace, 2
bind = $mainmod SHIFT, 3,          movetoworkspace, 3
bind = $mainmod SHIFT, 4,          movetoworkspace, 4
bind = $mainmod SHIFT, 5,          movetoworkspace, 5
bind = $mainmod SHIFT, 6,          movetoworkspace, 6
bind = $mainmod SHIFT, 7,          movetoworkspace, 7
bind = $mainmod SHIFT, 8,          movetoworkspace, 8
bind = $mainmod SHIFT, 9,          movetoworkspace, 9
bind = $mainmod SHIFT, 0,          movetoworkspace, 10

# Relative Workspace Navigation
bind = $submod, i,                 workspace, e+1           # Next workspace
bind = $submod, n,                 workspace, e-1           # Previous workspace
bind = $submod, right,             workspace, e+1           # Next workspace (arrow)
bind = $submod, left,              workspace, e-1           # Previous workspace (arrow)
bind = $submod, u,                 workspace, empty         # First empty workspace
bind = $mainmod SHIFT, i,          movetoworkspace, r+1     # Move window to next workspace
bind = $mainmod SHIFT, n,          movetoworkspace, r-1     # Move window to previous workspace

# Mouse Workspace Switching
bind = $mainmod, mouse_down,       workspace, e+1           # Next workspace (scroll)
bind = $mainmod, mouse_up,         workspace, e-1           # Previous workspace (scroll)

# Special Workspaces
bind = $mainmod, s,                togglespecialworkspace, magic # Toggle special workspace
bind = $mainmod SHIFT, s,          movetoworkspace, special:magic # Move to special workspace

########################
### GROUP MANAGEMENT ###
########################
bind = $mainmod, g,                togglegroup              # Toggle group
bind = $submod CTRL, n,            changegroupactive, b     # Previous window in group
bind = $submod CTRL, i,            changegroupactive, f     # Next window in group
bind = $submod CTRL, left,         changegroupactive, b     # Previous window in group (arrow)
bind = $submod CTRL, right,        changegroupactive, f     # Next window in group (arrow)

#########################
### HARDWARE CONTROLS ###
#########################

# Laptop multimedia keys for volume and LCD brightness

# # Volume Controls
bindel =       ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = SHIFT ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_SINK@ 5%+
bindel =       ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel =       ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel =       ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# # Brightness Controls (Requires brightnessctl)
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Media Controls (Requires playerctl)
bindl = , xf86audionext,           exec, playerctl next
bindl = , xf86audiopause,          exec, playerctl play-pause
bindl = , xf86audioplay,           exec, playerctl play-pause
bindl = , xf86audioprev,           exec, playerctl previous


################
### Gestures ###
################
gesture = 3, horizontal, workspace
gesture = 3, vertical, special, magic
